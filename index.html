<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경전의 변형: 사이비 종교 아카이브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0efed;
  --fg:#111;
  --accent:#c1121f;
  --mute:#999;
  --border:#ddd;
}
html,body{
  height:100%;overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--fg);
}

/* === LAYOUT === */
.container{display:flex;height:100vh;width:100vw;}

/* LEFT PANEL */
.left{
  width:42%;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  border-right:1px solid var(--border);
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
}
.left::-webkit-scrollbar{display:none;}

.religion-slide{
  height:100vh;
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:60px 48px 60px 56px;
  position:relative;
  transition:opacity 0.4s ease;
}
.religion-slide::after{
  content:'';position:absolute;bottom:0;left:56px;right:48px;
  height:1px;background:var(--border);
}

.slide-index{
  font-size:13px;font-weight:300;letter-spacing:0.3em;
  color:var(--mute);margin-bottom:20px;
}
.slide-type{
  display:inline-block;
  font-size:12px;font-weight:600;letter-spacing:0.15em;
  padding:5px 14px;border:2px solid;margin-bottom:24px;
}
.slide-name-ko{
  font-size:52px;font-weight:900;letter-spacing:-0.04em;
  line-height:1.1;margin-bottom:8px;
}
.slide-name-en{
  font-size:18px;font-weight:200;color:var(--mute);
  letter-spacing:0.02em;margin-bottom:28px;
}
.slide-meta{
  display:flex;gap:32px;margin-bottom:28px;
}
.slide-meta-item{
  font-size:13px;color:var(--mute);font-weight:300;
}
.slide-meta-item strong{
  display:block;font-size:16px;color:var(--fg);
  font-weight:600;margin-top:4px;
}
.slide-doctrine{
  font-size:15px;line-height:2.0;color:#555;
  font-weight:300;max-width:500px;
  border-top:1px solid #e5e5e5;
  padding-top:24px;
}
.slide-event{
  margin-top:20px;font-size:13px;
  color:var(--accent);font-weight:600;
  letter-spacing:0.05em;
}

/* RIGHT PANEL */
.right{
  width:58%;height:100vh;
  position:relative;
  overflow:hidden;
  perspective:1200px;
  background:var(--bg);
}

/* 3D Image Scene */
.image-scene{
  position:absolute;inset:0;
  transition:opacity 0.6s ease;
}
.image-scene.hidden{opacity:0;pointer-events:none;}
.image-scene.active{opacity:1;pointer-events:auto;}

.floating-img{
  position:absolute;
  transition:transform 0.8s cubic-bezier(0.23,1,0.32,1),
             opacity 0.6s ease,
             box-shadow 0.4s ease;
  cursor:pointer;
  transform-style:preserve-3d;
  will-change:transform;
}
.floating-img img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
.floating-img:hover{
  z-index:100!important;
  box-shadow:0 30px 60px rgba(0,0,0,0.25)!important;
}

/* Image caption */
.img-caption{
  position:absolute;bottom:-28px;left:0;right:0;
  font-size:11px;color:var(--mute);font-weight:300;
  text-align:center;letter-spacing:0.05em;
  opacity:0;transition:opacity 0.3s ease;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.floating-img:hover .img-caption{opacity:1;}

/* Scroll indicator */
.scroll-hint{
  position:fixed;bottom:24px;right:24px;
  font-size:11px;color:#ccc;letter-spacing:0.15em;
  font-weight:300;z-index:50;
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* Counter */
.counter{
  position:fixed;top:24px;right:32px;
  font-size:12px;color:var(--mute);letter-spacing:0.2em;
  font-weight:300;z-index:50;
}

/* Title watermark */
.watermark{
  position:fixed;top:24px;left:56px;
  font-size:11px;letter-spacing:0.4em;
  color:#ccc;font-weight:300;z-index:50;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div class="counter" id="counter">01 / 25</div>
<div class="scroll-hint">SCROLL ↕</div>

<div class="container">
  <!-- LEFT: Religion List -->
  <div class="left" id="leftPanel"></div>

  <!-- RIGHT: 3D Image Gallery -->
  <div class="right" id="rightPanel"></div>

const counterEl = document.getElementById('counter');

DATA.forEach((item, i) => {

  slide.className = 'religion-slide';
  slide.dataset.index = i;

  slide.innerHTML = `

// ============================================================
// RENDER RIGHT PANEL — 3D IMAGE SCENES
// ============================================================
DATA.forEach((item, i) => {
  const scene = document.createElement('div');
  scene.className = `image-scene ${i === 0 ? 'active' : 'hidden'}`;
  scene.dataset.index = i;

  item.imgs.forEach((img, j) => {
    const el = document.createElement('div');
    el.className = 'floating-img';
    el.style.cssText = `
      left:${img.x}%;top:${img.y}%;
      width:${img.w}%;height:${img.h}%;
      transform:perspective(800px) rotateX(${img.rx}deg) rotateY(${img.ry}deg) scale(${img.s});
      z-index:${10+j};
      box-shadow:0 ${8+j*4}px ${20+j*8}px rgba(0,0,0,${0.08+j*0.03});
      opacity:0;
    `;
    el.innerHTML = `
      <img src="${img.src}" alt="${img.cap}" loading="lazy"/>
      <div class="img-caption">${img.cap}</div>
    `;

    // Animate in with delay
    setTimeout(() => {
      el.style.opacity = '1';
    }, i === 0 ? 200 + j * 150 : 0);

    // Hover 3D tilt
    el.addEventListener('mouseenter', () => {
      el.style.transform = `perspective(800px) rotateX(0deg) rotateY(0deg) scale(${img.s * 1.08})`;
      el.style.zIndex = '100';
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = `perspective(800px) rotateX(${img.rx}deg) rotateY(${img.ry}deg) scale(${img.s})`;
      el.style.zIndex = `${10+j}`;
    });

    scene.appendChild(el);
  });

  rightPanel.appendChild(scene);
});

// ============================================================
// SCROLL SYNC — Left scroll drives right panel
// ============================================================
let currentIndex = 0;
const scenes = document.querySelectorAll('.image-scene');
const slides = document.querySelectorAll('.religion-slide');

function activateScene(index) {
  if (index === currentIndex) return;

  // Fade out current scene images
  const oldScene = scenes[currentIndex];
  const oldImgs = oldScene.querySelectorAll('.floating-img');
  oldImgs.forEach(img => { img.style.opacity = '0'; });
  setTimeout(() => { oldScene.classList.remove('active'); oldScene.classList.add('hidden'); }, 400);

  // Fade in new scene
  currentIndex = index;
  const newScene = scenes[index];
  newScene.classList.remove('hidden');
  newScene.classList.add('active');
  const newImgs = newScene.querySelectorAll('.floating-img');
  newImgs.forEach((img, j) => {
    setTimeout(() => { img.style.opacity = '1'; }, 100 + j * 120);
  });

  counterEl.textContent = `${String(index+1).padStart(2,'0')} / ${String(DATA.length).padStart(2,'0')}`;
}

// IntersectionObserver for left panel scroll
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
      const idx = parseInt(entry.target.dataset.index);
      activateScene(idx);
    }
  });
}, { root: leftPanel, threshold: 0.5 });

slides.forEach(slide => observer.observe(slide));

// ============================================================
// RIGHT PANEL — Scroll within scene to rotate images
// ============================================================
let rightScrollAccum = 0;
rightPanel.addEventListener('wheel', (e) => {
  e.preventDefault();
  rightScrollAccum += e.deltaY * 0.15;

  const scene = scenes[currentIndex];
  const imgs = scene.querySelectorAll('.floating-img');
  const item = DATA[currentIndex];

  imgs.forEach((el, j) => {
    const baseImg = item.imgs[j];
    const extraRx = Math.sin(rightScrollAccum * 0.01 + j) * 8;
    const extraRy = Math.cos(rightScrollAccum * 0.01 + j * 0.7) * 10;
    const extraX = Math.sin(rightScrollAccum * 0.005 + j * 1.3) * 3;
    const extraY = Math.cos(rightScrollAccum * 0.005 + j * 0.9) * 3;
    el.style.transform = `perspective(800px) rotateX(${baseImg.rx + extraRx}deg) rotateY(${baseImg.ry + extraRy}deg) scale(${baseImg.s}) translate(${extraX}%,${extraY}%)`;
  });
}, { passive: false });

// ============================================================
// MOUSE PARALLAX on right panel
// ============================================================
rightPanel.addEventListener('mousemove', (e) => {
  const rect = rightPanel.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width - 0.5;
  const my = (e.clientY - rect.top) / rect.height - 0.5;

  const scene = scenes[currentIndex];
  const imgs = scene.querySelectorAll('.floating-img');
  const item = DATA[currentIndex];

  imgs.forEach((el, j) => {
    const baseImg = item.imgs[j];
    const depth = 0.5 + j * 0.2;
    const px = mx * 6 * depth;
    const py = my * 4 * depth;
    el.style.transform = `perspective(800px) rotateX(${baseImg.rx + py}deg) rotateY(${baseImg.ry + px}deg) scale(${baseImg.s})`;
  });
});
</script>
</body>
</html>
